global:
  resolve_timeout: 15s

templates:
  - '/etc/alertmanager/*.tmpl'       # Alertmanager微信告警模板

route:
  group_by: ['env','instance','type','group','job','alertname']
  group_wait: 15s
  group_interval: 15s
  repeat_interval: 30s
  receiver: 'wechat'
 
receivers:
- name: 'wechat'
  webhook_configs:
  - url: 'http://192.168.32.146:8089/adapter/wx'
    send_resolved: true
 
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['env','instance','type','group','job','alertname']

